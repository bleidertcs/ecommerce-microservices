services:
  # Tyk API Gateway
  tyk-gateway:
    image: tykio/tyk-gateway:v5.0.0
    container_name: bw-tyk-gateway
    restart: unless-stopped
    ports:
      - "8080:8080" # Proxy
    environment:
      - TYK_GW_SECRET=${TYK_GW_SECRET}
      - TYK_GW_LISTENPORT=${TYK_GW_LISTENPORT}
    volumes:
      - ./tyk/tyk.conf:/opt/tyk-gateway/tyk.conf
      - ./tyk/apps:/opt/tyk-gateway/apps
      - ./tyk/policies/policies.json:/opt/tyk-gateway/policies/policies.json
    networks:
      - bw-network
    depends_on:
      - redis
      - auth-service
      - post-service

  # Tyk Pump (Analytics)
  tyk-pump:
    image: tykio/tyk-pump-docker-pub:v1.8.0
    container_name: bw-tyk-pump
    restart: unless-stopped
    depends_on:
      - redis
      - mongo
    environment:
      - TYK_PMP_ANALYTICSSTORAGECONFIG_TYPE=redis
      - TYK_PMP_ANALYTICSSTORAGECONFIG_HOST=redis
      - TYK_PMP_ANALYTICSSTORAGECONFIG_PORT=6379
      - TYK_PMP_PUMPS_MONGOAGGREGATE_TYPE=mongo-pump-aggregate
      - TYK_PMP_PUMPS_MONGOAGGREGATE_META_MONGOURL=mongodb://mongo:27017/tyk_analytics
      - TYK_PMP_PUMPS_MONGOAGGREGATE_META_USEMIXEDCOLLECTION=true
    networks:
      - bw-network

  # MongoDB (Required for Tyk Dashboard)
  mongo:
    image: mongo:5.0
    container_name: bw-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - bw-network

  # Authentication Service
  auth-service:
    build:
      context: ./auth
      dockerfile: Dockerfile
    container_name: bw-auth-service
    restart: unless-stopped
    ports:
      - "9001:9001"    # HTTP API
      - "50051:50051"  # gRPC
      - "9464:9464"    # Metrics
    env_file:
      - ./auth/.env.docker
    environment:
      - OTEL_SERVICE_NAME=auth-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=tempo:4317
      - OTEL_EXPORTER_OTLP_INSECURE=true
      - PYROSCOPE_SERVER_ADDRESS=http://pyroscope:4040
      - PYROSCOPE_APPLICATION_NAME=auth-service
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      - ACCESS_TOKEN_SECRET_KEY=${ACCESS_TOKEN_SECRET_KEY}
      - REFRESH_TOKEN_SECRET_KEY=${REFRESH_TOKEN_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      tempo:
        condition: service_started
    networks:
      - bw-network
    labels:
      logging: "promtail"
      logging_jobname: "auth-service"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Post Service
  post-service:
    build:
      context: ./post
      dockerfile: Dockerfile
    container_name: bw-post-service
    restart: unless-stopped
    ports:
      - "9002:9002"    # HTTP API
      - "50052:50052"  # gRPC
      - "9465:9464"    # Metrics (Host:9465 -> Port:9464)
    env_file:
      - ./post/.env.docker
    environment:
      - OTEL_SERVICE_NAME=post-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=tempo:4317
      - OTEL_EXPORTER_OTLP_INSECURE=true
      - PYROSCOPE_SERVER_ADDRESS=http://pyroscope:4040
      - PYROSCOPE_APPLICATION_NAME=post-service
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      - ACCESS_TOKEN_SECRET_KEY=${ACCESS_TOKEN_SECRET_KEY}
      - REFRESH_TOKEN_SECRET_KEY=${REFRESH_TOKEN_SECRET_KEY}
    depends_on:
      auth-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      tempo:
        condition: service_started
    networks:
      - bw-network
    labels:
      logging: "promtail"
      logging_jobname: "post-service"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9002/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: bw-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bw-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: bw-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - bw-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Grafana - Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: bw-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - bw-network
    depends_on:
      - loki
      - tempo
      - mimir

  # Loki - Logs Storage
  loki:
    image: grafana/loki:latest
    container_name: bw-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - bw-network

  # Promtail - Logs Collector
  promtail:
    image: grafana/promtail:latest
    container_name: bw-promtail
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./monitoring/promtail/config.yaml:/etc/promtail/config.yaml
    command: -config.file=/etc/promtail/config.yaml
    networks:
      - bw-network
    depends_on:
      - loki

  # Tempo - Tracing Storage
  tempo:
    image: grafana/tempo:latest
    container_name: bw-tempo
    restart: unless-stopped
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./monitoring/tempo/config.yaml:/etc/tempo.yaml
    ports:
      - "3200:3200"   # Tempo
      - "4317:4317"   # OTLP gRPC
    networks:
      - bw-network

  # Mimir - Metrics Storage
  mimir:
    image: grafana/mimir:latest
    container_name: bw-mimir
    restart: unless-stopped
    command: [ "-config.file=/etc/mimir.yaml", "-target=all" ]
    volumes:
      - ./monitoring/mimir/config.yaml:/etc/mimir.yaml
    ports:
      - "9009:9009"
    networks:
      - bw-network

  # Prometheus - Metrics Scraper
  prometheus:
    image: prom/prometheus:latest
    container_name: bw-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --enable-feature=remote-write-receiver
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/rules:/etc/prometheus/rules
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - bw-network
    depends_on:
      - mimir
      - alertmanager

  # Alertmanager - Alert Handling
  alertmanager:
    image: prom/alertmanager:latest
    container_name: bw-alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - bw-network

  # Pyroscope - Continuous Profiling
  pyroscope:
    image: grafana/pyroscope:latest
    container_name: bw-pyroscope
    restart: unless-stopped
    ports:
      - "4040:4040"
    networks:
      - bw-network

networks:
  bw-network:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  grafana_data:
  prometheus_data:
  alertmanager_data:
