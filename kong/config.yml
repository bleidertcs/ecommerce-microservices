_format_version: "3.0"
_transform: true

plugins:
  - name: cors
    config:
      origins:
        - "http://localhost:3000"
        - "http://localhost:8010"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - Authorization
        - traceparent
        - tracestate
        - baggage
        - x-user-id
      exposed_headers:
        - X-Total-Count
      credentials: true
      max_age: 3600

services:
  - name: swagger-ui
    url: http://bw-swagger-ui:8080
    routes:
      - name: swagger-routes
        paths:
          - /docs
        strip_path: false

  - name: users-service
    url: http://bw-users-service:9001
    routes:
      - name: users-docs
        paths:
          - /api/v1/users/docs
        strip_path: false
        protocols: ["http", "https"]
        methods: ["GET"]
      - name: users-routes
        paths:
          - /api/v1/users
        strip_path: false
        protocols: ["http", "https"]
        methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
        plugins:
          - name: opentelemetry
            config:
              endpoint: http://bw-signoz-otel-collector:4317
              resource_attributes:
                service.name: kong-gateway
          - name: jwt
            config:
              claims_to_verify: ["exp"]
              key_claim_name: iss
          - name: request-transformer
            config:
              add:
                headers:
                  - x-user-id:$(jwt_claim_sub)
          - name: rate-limiting
            config:
              minute: 60
              policy: redis
              limit_by: header
              header_name: x-user-id
              redis:
                host: redis
                port: 6379

  - name: products-service
    url: http://bw-products-service:9002
    routes:
      - name: products-catalog
        paths:
          - /api/v1/products
        strip_path: false
        protocols: ["http", "https"]
        methods: ["GET", "OPTIONS"]
        plugins:
          - name: opentelemetry
            config:
              endpoint: http://bw-signoz-otel-collector:4317
              resource_attributes:
                service.name: kong-gateway
          - name: rate-limiting
            config:
              minute: 100
              policy: redis
              limit_by: ip
              redis:
                host: redis
                port: 6379
      - name: products-management
        paths:
          - /api/v1/products
        strip_path: false
        protocols: ["http", "https"]
        methods: ["POST", "PUT", "PATCH", "DELETE"]
        plugins:
