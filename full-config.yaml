name: nestjs-microservices
services:
  cart-db:
    container_name: bw-cart-db
    environment:
      POSTGRES_DB: cart
      POSTGRES_PASSWORD: master123
      POSTGRES_USER: admin
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U admin -d cart
      timeout: 5s
      interval: 10s
      retries: 5
    image: postgres:15-alpine
    networks:
      bw-network: null
    ports:
      - mode: ingress
        target: 5432
        published: "15437"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: volume
        source: cart_data
        target: /var/lib/postgresql/data
        volume: {}
  cart-service:
    build:
      context: C:\Desarrollo\Gateway\nestjs-microservices\cart
      dockerfile: Dockerfile
    container_name: bw-cart-service
    depends_on:
      cart-db:
        condition: service_healthy
        required: true
      redis:
        condition: service_healthy
        required: true
      signoz-otel-collector:
        condition: service_started
        required: true
    environment:
      APP_NAME: Cart Service
      DATABASE_URL: postgresql://admin:master123@cart-db:5432/cart?schema=public
      GRPC_URL: 0.0.0.0:50057
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: "9007"
      NODE_ENV: development
      OTEL_EXPORTER_OTLP_ENDPOINT: http://signoz-otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: cart-service
      PRODUCTS_GRPC_URL: products-service:50052
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_URL: redis://redis:6379
    healthcheck:
      test:
        - CMD-SHELL
        - wget --no-verbose --tries=1 --spider http://localhost:9007/health || exit 1
      timeout: 10s
      interval: 30s
      retries: 3
      start_period: 40s
    networks:
      bw-network: null
    ports:
      - mode: ingress
        target: 9007
        published: "9007"
        protocol: tcp
      - mode: ingress
        target: 50057
        published: "50057"
        protocol: tcp
    restart: unless-stopped
  casdoor:
    container_name: bw-casdoor
    depends_on:
      casdoor-db:
        condition: service_healthy
        required: true
    environment:
      casdoorEndpoint: http://localhost:8000
      dataSourceName: user=casdoor password=casdoor_pass123 host=casdoor-db port=5432 sslmode=disable dbname=casdoor
      dbName: casdoor
      driverName: postgres
    image: casbin/casdoor:latest
    networks:
      bw-network: null
    ports:
      - mode: ingress
        target: 8000
        published: "8000"
        protocol: tcp
    restart: unless-stopped
  casdoor-db:
    container_name: bw-casdoor-db
    environment:
      POSTGRES_DB: casdoor
      POSTGRES_PASSWORD: casdoor_pass123
      POSTGRES_USER: casdoor
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U casdoor -d casdoor
      timeout: 5s
      interval: 10s
      retries: 5
    image: postgres:15-alpine
    networks:
      bw-network: null
    restart: unless-stopped
    volumes:
      - type: volume
        source: casdoor_database
        target: /var/lib/postgresql/data
        volume: {}
  clickhouse:
    container_name: bw-clickhouse
    depends_on:
      init-clickhouse:
        condition: service_completed_successfully
        required: true
      zookeeper:
        condition: service_healthy
        required: true
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    healthcheck:
      test:
        - CMD
        - wget
        - --spider
        - -q
        - 0.0.0.0:8123/ping
      timeout: 5s
      interval: 30s
      retries: 3
    image: clickhouse/clickhouse-server:25.5.6
    networks:
      bw-network: null
    restart: unless-stopped
    tty: true
    volumes:
      - type: volume
        source: clickhouse_data
        target: /var/lib/clickhouse
        volume: {}
      - type: volume
        source: clickhouse_user_scripts
        target: /var/lib/clickhouse/user_scripts
        volume: {}
      - type: bind
        source: C:\Desarrollo\Gateway\nestjs-microservices\monitoring\signoz\clickhouse-config.xml
        target: /etc/clickhouse-server/config.d/logging.xml
        read_only: true
        bind: {}
      - type: bind
        source: C:\Desarrollo\Gateway\nestjs-microservices\monitoring\signoz\clickhouse-users.xml
        target: /etc/clickhouse-server/users.d/logging.xml
        read_only: true
        bind: {}
      - type: bind
        source: C:\Desarrollo\Gateway\nestjs-microservices\monitoring\signoz\clickhouse-cluster.xml
        target: /etc/clickhouse-server/config.d/clickhouse-cluster.xml
        read_only: true
        bind: {}
  init-clickhouse:
    command:
      - bash
      - -c
      - |
        version="v0.0.1"
        node_os=$$(uname -s | tr '[:upper:]' '[:lower:]')
        node_arch=$$(uname -m | sed s/aarch64/arm64/ | sed s/x86_64/amd64/)
        echo "Fetching histogram-binary for $${node_os}/$${node_arch}"
        cd /tmp
        wget -O histogram-quantile.tar.gz "https://github.com/SigNoz/signoz/releases/download/histogram-quantile%2F$${version}/histogram-quantile_$${node_os}_$${node_arch}.tar.gz"
        tar -xvzf histogram-quantile.tar.gz
        mv histogram-quantile /var/lib/clickhouse/user_scripts/histogramQuantile
    container_name: bw-init-clickhouse
    image: clickhouse/clickhouse-server:25.5.6
    networks:
      bw-network: null
    restart: on-failure
    volumes:
      - type: volume
        source: clickhouse_user_scripts
        target: /var/lib/clickhouse/user_scripts
        volume: {}
  kong:
    container_name: bw-kong
    depends_on:
      cart-service:
        condition: service_started
        required: true
      orders-service:
        condition: service_started
        required: true
      payments-service:
        condition: service_started
        required: true
      products-service:
        condition: service_started
        required: true
      redis:
        condition: service_started
        required: true
      users-service:
        condition: service_started
        required: true
    environment:
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_PROXY_LISTEN: 0.0.0.0:8010
    healthcheck:
      test:
        - CMD
        - kong
        - health
      timeout: 10s
      interval: 30s
      retries: 3
    image: kong:latest
    networks:
      bw-network: null
    ports:
      - mode: ingress
        target: 8010
        published: "8010"
        protocol: tcp
      - mode: ingress
        target: 8443
        published: "8443"
        protocol: tcp
      - mode: ingress
        target: 8001
        published: "8001"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: C:\Desarrollo\Gateway\nestjs-microservices\kong\config.yml
        target: /var/lib/kong/kong.yml
        read_only: true
        bind: {}
  nats:
    command:
      - -m
      - "8222"
    container_name: bw-nats
    healthcheck:
      test:
        - CMD
        - wget
        - --no-verbose
        - --tries=1
        - --spider
        - http://localhost:8222/varz
      timeout: 5s
      interval: 10s
      retries: 3
    image: nats:2.10-alpine
    networks:
      bw-network: null
    ports:
      - mode: ingress
        target: 4222
        published: "4222"
        protocol: tcp
      - mode: ingress
        target: 8222
        published: "8222"
        protocol: tcp
    restart: unless-stopped
  notifications-service:
    build:
      context: C:\Desarrollo\Gateway\nestjs-microservices\notifications
      dockerfile: Dockerfile
    container_name: bw-notifications-service
    depends_on:
      rabbitmq:
        condition: service_healthy
        required: true
      signoz-otel-collector:
        condition: service_started
        required: true
    environment:
      APP_NAME: Notifications Service
      GRPC_URL: 0.0.0.0:50055
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: "9005"
      NODE_ENV: development
      OTEL_EXPORTER_OTLP_ENDPOINT: http://signoz-otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: notifications-service
      RABBITMQ_QUEUE: ecommerce_events
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    networks:
      bw-network: null
    ports:
      - mode: ingress
        target: 9005
        published: "9015"
        protocol: tcp
      - mode: ingress
        target: 50055
        published: "50055"
        protocol: tcp
    restart: unless-stopped
