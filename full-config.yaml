        source: C:\Desarrollo\Gateway\nestjs-microservices\monitoring\signoz\otel-collector-config.yaml
        target: /etc/otel-collector-config.yaml
        read_only: true
        bind: {}
      - type: bind
        source: /var/lib/docker/containers
        target: /var/lib/docker/containers
        read_only: true
        bind: {}
  signoz-telemetrystore-migrator:
    command:
      - -c
      - |
        /signoz-otel-collector migrate bootstrap &&
        /signoz-otel-collector migrate sync up &&
        /signoz-otel-collector migrate async up
    container_name: bw-signoz-telemetrystore-migrator
    depends_on:
      clickhouse:
        condition: service_healthy
        required: true
    entrypoint:
      - /bin/sh
    environment:
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER: cluster
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN: tcp://clickhouse:9000
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION: "true"
      SIGNOZ_OTEL_COLLECTOR_TIMEOUT: 10m
    image: signoz/signoz-otel-collector:v0.142.0
    networks:
      bw-network: null
    restart: on-failure
  swagger-ui:
    container_name: bw-swagger-ui
    environment:
      BASE_URL: /docs
      URLS: '[{url: ''/api/v1/users/docs-json'', name: ''Users''}, {url: ''/api/v1/products/docs-json'', name: ''Products''}, {url: ''/api/v1/orders/docs-json'', name: ''Orders''}, {url: ''/api/v1/payments/docs-json'', name: ''Payments''}, {url: ''/api/v1/cart/docs-json'', name: ''Cart''}]'
